<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Flight - 31 Waypoints</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: monospace; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #0f0;
            background: rgba(0, 20, 0, 0.8); padding: 15px; border: 1px solid #0f0;
            pointer-events: none; text-shadow: 0 0 5px #0f0; z-index: 10;
        }
        .stat { font-size: 1.1rem; margin-bottom: 4px; }
        .controls { font-size: 0.8rem; color: #8f8; margin-top: 10px; border-top: 1px solid #0f0; padding-top: 8px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">ALT: <span id="alt">0</span> FT</div>
        <div class="stat">SPD: <span id="speed">0</span> KN</div>
        <div class="stat">GEAR: <span id="gear">DOWN</span></div>
        <div class="stat">VIEW: <span id="view">CHASE</span></div>
        <div class="controls">
            W/S: PITCH | A/D: ROLL | SHIFT/CTRL: THRUST<br>
            <b>C: COCKPIT</b> | <b>G: GEAR</b> | <b>SPACE: LEVEL</b>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 200, 3000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(500, 1000, 500);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));

        // --- MATERIALS ---
        const planeMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
        const stoneMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
        const runwayMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        // --- THE PLANE ---
        const plane = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.8, 4), planeMat);
        const wings = new THREE.Mesh(new THREE.BoxGeometry(7, 0.1, 1.5), planeMat);
        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 1.2), new THREE.MeshStandardMaterial({color: 0x000000, transparent: true, opacity: 0.5}));
        cockpit.position.set(0, 0.5, -0.8);
        const dash = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.1), new THREE.MeshStandardMaterial({color: 0x222222}));
        dash.position.set(0, 0.4, -1.3);
        const gearGroup = new THREE.Group();
        const wheel = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.25), new THREE.MeshStandardMaterial({color: 0x111111}));
        const gearL = wheel.clone(); gearL.position.set(0.6, -0.5, 0);
        const gearR = wheel.clone(); gearR.position.set(-0.6, -0.5, 0);
        const gearF = wheel.clone(); gearF.position.set(0, -0.5, -1.5);
        gearGroup.add(gearL, gearR, gearF);
        plane.add(body, wings, cockpit, dash, gearGroup);
        scene.add(plane);
        plane.position.set(0, 1, 0);

        // --- WORLD DATA ---
        const CHUNK_SIZE = 1000;
        const runways = [];

        function createRunway(x, z, rotation) {
            const rGroup = new THREE.Group();
            // Lifted to 0.5 to stay above green ground
            const asphalt = new THREE.Mesh(new THREE.BoxGeometry(50, 0.5, 800), runwayMat);
            const stripe = new THREE.Mesh(new THREE.PlaneGeometry(2, 800), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            stripe.rotation.x = -Math.PI/2;
            stripe.position.y = 0.3; // Above asphalt
            
            // Red Marker for visibility
            const marker = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), markerMat);
            marker.position.y = 100;

            rGroup.add(asphalt, stripe, marker);
            rGroup.position.set(x, 0.25, z);
            rGroup.rotation.y = rotation;
            scene.add(rGroup);
            runways.push({ x, z });
        }

        // Initialize 31 Runways
        for(let i=0; i<31; i++) {
            const rx = i === 0 ? 0 : (Math.random() - 0.5) * 8000;
            const rz = i === 0 ? -400 : (Math.random() - 0.5) * 8000;
            const rot = Math.random() * Math.PI;
            createRunway(rx, rz, rot);
        }

        const chunks = new Map();
        function createChunk(cx, cz) {
            const group = new THREE.Group();
            // Ground
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE), grassMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = 0; 
            group.add(ground);

            // Mountains (Only spawn if not near a runway)
            const chunkWorldX = cx * CHUNK_SIZE;
            const chunkWorldZ = cz * CHUNK_SIZE;
            
            let nearRunway = runways.some(r => Math.hypot(r.x - chunkWorldX, r.z - chunkWorldZ) < 600);

            if(!nearRunway) {
                for (let i = 0; i < 4; i++) {
                    const h = Math.random() * 300 + 50;
                    const w = Math.random() * 100 + 50;
                    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), stoneMat);
                    m.position.set((Math.random()-0.5)*CHUNK_SIZE, h/2, (Math.random()-0.5)*CHUNK_SIZE);
                    group.add(m);
                }
            }

            group.position.set(chunkWorldX, 0, chunkWorldZ);
            scene.add(group);
            chunks.set(`${cx},${cz}`, group);
        }

        // --- CONTROLS ---
        let speed = 0, isCockpit = false, gearDown = true;
        const keys = {};
        window.onkeydown = (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyC') isCockpit = !isCockpit;
            if(e.code === 'KeyG') gearDown = !gearDown;
        };
        window.onkeyup = (e) => keys[e.code] = false;

        const clock = new THREE.Clock();

        function update() {
            const dt = clock.getDelta();
            if (keys['ShiftLeft']) speed += 70 * dt;
            if (keys['ControlLeft']) speed -= 70 * dt;
            speed = Math.max(0, Math.min(speed, 300));

            if (keys['KeyW']) plane.rotateX(-1.8 * dt);
            if (keys['KeyS']) plane.rotateX(1.8 * dt);
            if (keys['KeyA']) plane.rotateZ(2.2 * dt);
            if (keys['KeyD']) plane.rotateZ(-2.2 * dt);
            if (keys['Space']) { plane.rotation.z *= 0.9; plane.rotation.x *= 0.9; }

            plane.translateZ(-speed * dt);

            // Ground check
            if(plane.position.y < 0.7) {
                plane.position.y = 0.7;
                plane.rotation.x = 0;
                plane.rotation.z = 0;
            }

            gearGroup.scale.y = THREE.MathUtils.lerp(gearGroup.scale.y, gearDown ? 1 : 0.01, 0.1);
            gearGroup.position.y = gearDown ? 0 : 0.4;

            if(isCockpit) {
                camera.position.copy(new THREE.Vector3(0, 0.6, -0.8).applyMatrix4(plane.matrixWorld));
                camera.lookAt(new THREE.Vector3(0, 0.6, -10).applyMatrix4(plane.matrixWorld));
            } else {
                const offset = new THREE.Vector3(0, 6, 18).applyQuaternion(plane.quaternion);
                camera.position.lerp(plane.position.clone().add(offset), 0.1);
                camera.lookAt(plane.position);
            }

            const px = Math.round(plane.position.x / CHUNK_SIZE);
            const pz = Math.round(plane.position.z / CHUNK_SIZE);
            for(let x=px-3; x<=px+3; x++) for(let z=pz-3; z<=pz+3; z++) {
                if(!chunks.has(`${x},${z}`)) createChunk(x, z);
            }

            document.getElementById('speed').innerText = Math.round(speed);
            document.getElementById('alt').innerText = Math.max(0, Math.round(plane.position.y * 10 - 7));
            document.getElementById('gear').innerText = gearDown ? "DOWN" : "UP";
            document.getElementById('view').innerText = isCockpit ? "COCKPIT" : "CHASE";
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
